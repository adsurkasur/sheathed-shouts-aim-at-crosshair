; ─────────────────────────────────────────────────────────────────────────────
;  Sheathed Shouts Aim at Crosshair — Configuration
; ─────────────────────────────────────────────────────────────────────────────
;
;  Place this file at:  Data/SKSE/Plugins/SheathedShoutsAimAtCrosshair.ini
;
;  All values are 0 (disabled) or 1 (enabled).
;  If the file is missing, the plugin uses the defaults shown below.
;

[General]

; Master toggle. Set to 0 to completely disable the plugin without removing it.
Enable=1

; Only correct shout aim when the player's weapons are sheathed.
; Set to 0 to apply the correction to ALL shouts regardless of weapon state.
OnlyWhenWeaponsSheathed=1

; Rotate the player to match the camera's horizontal (yaw) direction
; before the shout fires.
MatchCameraYaw=1

; (Experimental / Reserved) Also correct the vertical pitch to match
; the camera.  Not recommended — may break cone and area shouts.
; Default: disabled.
MatchCameraPitch=0

; Write detailed debug messages to the SKSE log every time a shout
; aim correction is applied.  Useful for troubleshooting.
DebugLogging=0
